<script>
    if (localStorage.getItem("allowedLogin") !== "true") {
        window.location.href = "/";
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQr1QkYcdrGrsagb5YQtie8v1qpZdVIwwTS_A&s" type="image/png">
</head>


<body class="dashboard-page">
    <header class="page-header">
        <h1>Welcome to <strong>{{ club_name }}</strong></h1>
        <button onclick="goToDashboard()">Back</button>
    </header>

    <main class="page-shell allergies-page">
                <a class="add-member-btn add-allergy-btn" href="{{ url_for('allergy_new_form') }}">Add an Allergy</a>
    
        {% for id, first, last, text, severity in allergies %}
        <div class="allergy-row">
        <div class="allergy-left"><strong>{{ last }}, {{ first }}</strong> — {{ text }}</div>
        <div class="allergy-right">
            <span class="badge badge-{{ severity|lower }}">{{ severity }}</span>
            <form method="POST" action="{{ url_for('delete_allergy', id=id) }}" style="display:inline"><button class="delete-btn">Delete</button></form>
        </div>
        </div>
        {% else %}
        <div>No allergies recorded</div>
        {% endfor %}
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
