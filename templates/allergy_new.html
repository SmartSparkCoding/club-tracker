<script>
    if (localStorage.getItem("allowedLogin") !== "true") {
        window.location.href = "/";
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQr1QkYcdrGrsagb5YQtie8v1qpZdVIwwTS_A&s" type="image/png">
</head>


<body class="dashboard-page">
    <header class="page-header">
        <h1>Welcome to <strong>{{ club_name }}</strong></h1>
        <button onclick="goToAllergies()">Back</button>
    </header>

    <main class="page-shell member-form-page">
        <form class="main_div member-form-card" method="POST" action="{{ url_for('add_allergy_global') }}">
            <select name="member_id" required>
                <option value="" disabled selected>Select member</option>
                {% for id, first, last in members %}
                <option value="{{ id }}">{{ last }}, {{ first }}</option>
                {% endfor %}
            </select>
            <select name="severity" required>
                <option value="Severe">Severe</option><option value="Moderate">Moderate</option><option value="Mild">Mild</option>
            </select>
            <input name="allergy_text" placeholder="Allergy (e.g. Peanuts)" required>
            <button type="submit">Add Allergy</button>
        </form>

    </main>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
