<script>
    // lock them out of using /dashboard if they aren't logged in
    if (localStorage.getItem("allowedLogin") !== "true") {
        window.location.href = "/";
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQr1QkYcdrGrsagb5YQtie8v1qpZdVIwwTS_A&s" type="image/png">
</head>


<body class="dashboard-page">
    <header class="page-header">
        <h1>AS Hack Club Tracker</h1>
        <button onclick="logout()">Logout</button> <!-- this will be at the top right -->
    </header>
    
    <main class="page-shell">
        <div class="loggedin_div" id="user_div">
            <h2>Welcome to {{ club_name }}</h2> <!-- this will be at the top center, below the header -->
        </div>
        
                <div class="dashboard-grid">

                    <div class="card" id="members_button">
                        <button onclick="goToMembers()">Members</button> 
                    </div>

                    <div class="card" id="allergies_button">
                        <button onclick="goToAllergies()">Allergies</button>
                    </div>

                    <div class="card" id="projects_button">
                        <button onclick="goToProjects()">Projects</button>
                    </div>

                    <div class="card" id="attendance_button">
                        <button onclick="goToAttendance()">Attendance</button>
                    </div>

                </div>

        <div class="overall-info">
            
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
