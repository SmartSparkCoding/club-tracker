<script>
    // lock them out of using /dashboard if they aren't logged in
    if (localStorage.getItem("allowedLogin") !== "true") {
        window.location.href = "/";
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQr1QkYcdrGrsagb5YQtie8v1qpZdVIwwTS_A&s" type="image/png">
    <link rel="preload" as="image" href="{{ url_for('static', filename='members.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='allergies.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='projects.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='attendance.png') }}">
</head>


<body class="dashboard-page">
    <header class="page-header">
        <h1>AS Hack Club Tracker</h1>
        <button onclick="logout()">Logout</button> <!-- this will be at the top right -->
    </header>
    
    <main class="page-shell">
        <div class="loggedin_div" id="user_div">
            <h1>Welcome to {{ club_name }}</h1> <!-- this will be at the top center, below the header -->
            <h2>Logged in as <strong>{{ user }}</strong></h2>
        </div>
        
                <div class="dashboard-grid">

                    <div class="card" onclick="goToMembers()" role="button" tabindex="0">
                        <img src="{{ url_for('static', filename='members.png') }}" alt="Members" loading="eager" fetchpriority="high">
                        <div class="card-footer"><strong>Members</strong></div>
                    </div>

                    <div class="card" id="allergies_button" role="button" tabindex="0" onclick="goToAllergies()" onkeydown="if(event.key==='Enter'||event.key===' '){ event.preventDefault(); goToAllergies(); }">
                        <img src="{{ url_for('static', filename='allergies.png') }}" alt="Allergies" loading="eager" fetchpriority="high">
                        <div class="card-footer"><strong>Allergies</strong></div>
                    </div>

                    <div class="card" id="projects_button" role="button" tabindex="0" onclick="goToProjects()" onkeydown="if(event.key==='Enter'||event.key===' '){ event.preventDefault(); goToProjects(); }">
                        <img src="{{ url_for('static', filename='projects.png') }}" alt="Projects" loading="eager" fetchpriority="high">
                        <div class="card-footer"><strong>Projects</strong></div>
                    </div>

                    <div class="card" id="attendance_button" role="button" tabindex="0" onclick="goToAttendance()" onkeydown="if(event.key==='Enter'||event.key===' '){ event.preventDefault(); goToAttendance(); }">
                        <img src="{{ url_for('static', filename='attendance.png') }}" alt="Attendance" loading="eager" fetchpriority="high">
                        <div class="card-footer"><strong>Attendance</strong></div>
                    </div>

                </div>

        <div class="overall-info">
            
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
