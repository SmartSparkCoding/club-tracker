<script>
    if (localStorage.getItem("allowedLogin") !== "true") {
        window.location.href = "/";
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQr1QkYcdrGrsagb5YQtie8v1qpZdVIwwTS_A&s" type="image/png">
</head>


<body class="dashboard-page">
    <header class="page-header">
        <h1>Welcome to <strong>{{ club_name }}</strong></h1>
        <button onclick="goToMembers()">Back</button>
    </header>

    <main class="page-shell member-form-page">
        <form class="main_div member-form-card" method="POST" action="{{ url_for('add_member') }}">
            <h3>Add New Member to {{ club_name }}</h3>
            <input type="text" name="first_name" placeholder="First Name..." required>
            <input type="text" name="last_name" placeholder="Last Name..." required>
            <input type="number" name="year" placeholder="Year..." required>
            <input type="email" name="email" placeholder="Email...">
            <button type="submit">Add Member</button>
        </form>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
